<div class="range-slider">
  <mat-slider [min]="min" [max]="max" [step]="step">
    <input
      matSliderStartThumb
      [(ngModel)]="value.min"
      (valueChange)="onValueChange()"
    />

    <input
      matSliderEndThumb
      [(ngModel)]="value.max"
      (valueChange)="onValueChange()"
    />
  </mat-slider>
  <p class="range-slider__label">
    {{ label }}: {{ prefix }}{{ value.min }}{{ suffix }}
    -
    {{ prefix }}{{ value.max }}{{ suffix }}
  </p>
</div>
