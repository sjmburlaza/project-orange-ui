@if (products$ | async; as products) {
  <app-product-list-toolbar
    [categoryOptions]="categoryOptions$ | async"
    (selectedCategoryChange)="onCategoryChange($event)"
  ></app-product-list-toolbar>
  <div class="products">
    @for (product of products; track product.id) {
      <app-product-card
        [product]="product"
        [currency]="siteService.config().currency"
        (addToCart)="addToCart($event)"
      ></app-product-card>
    }
  </div>
} @else {
  <p>No products to show.</p>
}
