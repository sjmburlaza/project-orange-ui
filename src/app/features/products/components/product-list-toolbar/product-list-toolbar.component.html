<div class="filter-container">
  @if (sortOptions) {
    <div class="filter filter-sort">
      {{ "products.filters.sortBy" | translate }}
      <app-select-dropdown
        [placeholder]="'products.filters.defaultSort' | translate"
        [options]="sortOptions"
        [selectedValue]="selectedSort"
        (selectedValueChange)="onSortChange($event)"
      />
    </div>
  }
  @if (categoryOptions) {
    <div class="filter filter-category">
      <p>{{ "products.filters.category" | translate }}</p>
      <app-select-dropdown
        [placeholder]="'products.filters.allCategories' | translate"
        [options]="categoryOptions"
        [selectedValue]="selectedCategory"
        (selectedValueChange)="onCategoryChange($event)"
      />
    </div>
  }
  @if (priceRange) {
    <div class="filter-price">
      <app-range-slider
        [label]="'products.filters.filterPrice' | translate"
        [prefix]="pricePrefix"
        [min]="priceMin"
        [max]="priceMax ?? priceMin"
        [step]="100"
        [value]="priceRange"
        (valueChange)="onPriceRangeChange($event)"
      />
    </div>
  }
  <div class="filter-clear">
    <button matButton="outlined" (click)="clearFilters.emit()">
      {{ "products.filters.clearFilters" | translate }}
    </button>
  </div>
</div>
