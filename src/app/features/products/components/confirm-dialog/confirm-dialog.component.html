<div class="dialog-container">
  <h2>{{ data.title }}</h2>
  <p>{{ data.message }}</p>
  <div class="actions">
    <button matButton="outlined" (click)="continueShopping()">
      Continue Shopping
    </button>
    <button matButton="filled" (click)="goToCart()">Go to Cart</button>
  </div>
</div>
