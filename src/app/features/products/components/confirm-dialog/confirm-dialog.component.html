<div class="dialog-container">
  <h2>{{ data.title | translate }}</h2>
  <p>{{ data.message | translate }}</p>
  <div class="actions">
    <button matButton="outlined" (click)="continueShopping()">
      {{ "products.cart.continueShopping" | translate }}
    </button>
    <button matButton="filled" (click)="goToCart()">
      {{ "products.cart.goToCart" | translate }}
    </button>
  </div>
</div>
