<div class="layout">
  <div class="item image">
    @if (item.imageUrl) {
      <img [src]="item.imageUrl" [alt]="item.productName" />
    } @else {
      <i [class]="item.categoryName | categoryIcon"></i>
    }
  </div>
  <div class="item details">
    <h3>{{ item.productName }}</h3>
    <h4>subtext here</h4>
  </div>
  <div class="item price">
    <p>{{ item.price }}</p>
  </div>
  <div class="item actions"></div>
</div>
