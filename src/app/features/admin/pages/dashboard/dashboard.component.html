@let data = dashboard();
@let currencyCode = currency();

<section class="analytics">
  <header class="analytics__header">
    <div>
      <p class="eyebrow">Admin Analytics</p>
      <h1>Analytics Dashboard</h1>
    </div>
    <div class="analytics__period">
      <span class="analytics__period-label">Period</span>
      <div class="analytics__period-control">
        <button
          class="analytics__period-trigger"
          type="button"
          aria-haspopup="listbox"
          [attr.aria-expanded]="isPeriodMenuOpen()"
          (click)="togglePeriodMenu()"
          (keydown.escape)="closePeriodMenu()"
        >
          {{ selectedPeriodLabel() }}
        </button>

        @if (isPeriodMenuOpen()) {
          <div class="analytics__period-menu" role="listbox">
            @for (option of periodOptions; track option.value) {
              <button
                class="analytics__period-option"
                type="button"
                role="option"
                [class.analytics__period-option--selected]="
                  option.value === selectedPeriod()
                "
                [attr.aria-selected]="option.value === selectedPeriod()"
                (click)="selectPeriod(option.value)"
              >
                {{ option.label }}
              </button>
            }
          </div>
        }
      </div>
    </div>
  </header>

  <mat-tab-group class="analytics-tabs" [mat-stretch-tabs]="false">
    <mat-tab label="Overview">
      <app-overview-tab
        [cards]="overviewCards()"
        [currency]="currencyCode"
        [data]="data"
      ></app-overview-tab>
    </mat-tab>

    <mat-tab label="Revenue">
      <app-revenue-tab
        [cards]="revenueCards()"
        [currency]="currencyCode"
        [data]="data"
        [maxCategoryRevenue]="maxCategoryRevenue()"
        [maxDailyRevenue]="maxDailyRevenue()"
      ></app-revenue-tab>
    </mat-tab>

    <mat-tab label="Orders">
      <app-orders-tab
        [cards]="orderCards()"
        [currency]="currencyCode"
        [data]="data"
      ></app-orders-tab>
    </mat-tab>

    <mat-tab label="Visitors">
      <app-visitors-tab
        [cards]="visitorCards()"
        [data]="data"
        [maxDailyViews]="maxDailyViews()"
        [maxDailyVisitors]="maxDailyVisitors()"
      ></app-visitors-tab>
    </mat-tab>

    <mat-tab label="Funnel">
      <app-funnel-tab [data]="data"></app-funnel-tab>
    </mat-tab>

    <mat-tab label="Top Products">
      <app-top-products-tab
        [currency]="currencyCode"
        [data]="data"
        [maxProductRevenue]="maxProductRevenue()"
      ></app-top-products-tab>
    </mat-tab>

    <mat-tab label="Payment Failures">
      <app-payment-failures-tab
        [cards]="paymentCards()"
        [currency]="currencyCode"
        [data]="data"
      ></app-payment-failures-tab>
    </mat-tab>
  </mat-tab-group>
</section>
