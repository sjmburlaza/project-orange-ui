<div class="tab-panel">
  <section class="metric-grid metric-grid--compact">
    @for (card of cards; track card.label) {
      <article class="metric-card" [class]="'metric-card metric-card--' + (card.tone ?? 'default')">
        <span class="metric-card__label">
          {{ card.label }}
          <app-info-tooltip
            [info]="card.info"
            [label]="card.label"
          ></app-info-tooltip>
        </span>
        <strong>{{ card.value }}</strong>
        <small>{{ card.helper }}</small>
      </article>
    }
  </section>

  <section class="panel">
    <div class="panel__header">
      <h2>Visitor Activity</h2>
      <span>{{ data.productViews | number }} product views</span>
    </div>
    <div class="daily-bars daily-bars--traffic">
      @for (day of dailyLatestFirst; track day.dateKey) {
        <div class="daily-row">
          <span>{{ day.label }}</span>
          <div class="bar-group">
            <div class="bar">
              <span
                class="bar__fill"
                [style.width]="barWidth(day.visitors, maxDailyVisitors)"
              ></span>
            </div>
            <div class="bar bar--views">
              <span
                class="bar__fill"
                [style.width]="barWidth(day.productViews, maxDailyViews)"
              ></span>
            </div>
          </div>
          <strong>{{ day.visitors | number }} / {{ day.productViews | number }}</strong>
        </div>
      }
    </div>
  </section>
</div>
