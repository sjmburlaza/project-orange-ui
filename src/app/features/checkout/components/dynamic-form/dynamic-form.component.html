<form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
  @for (field of fields; track field.name) {
    <app-dynamic-field
      [field]="field"
      [form]="form"
      [ngClass]="getGridClass(field)"
    />
  }
  <button mat-raised-button color="primary" type="submit">Submit</button>
</form>
