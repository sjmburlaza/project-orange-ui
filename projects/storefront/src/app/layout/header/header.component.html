@if (isCheckoutRoute) {
  <div class="checkout-header">
    <div class="brand">
      <mat-icon aria-hidden="true">shopping_bag</mat-icon>
      <h1>ORANGE</h1>
    </div>
  </div>
} @else {
  <div class="header">
    <a
      class="home-btn"
      [routerLink]="['/', site()]"
      aria-label="Orange home"
    >
      <div class="brand">
        <mat-icon aria-hidden="true">shopping_bag</mat-icon>
        <h1>ORANGE</h1>
      </div>
    </a>
    <nav class="primary-nav" aria-label="Primary navigation">
      @for (item of primaryNavigationItems; track item.translationKey) {
        <a
          [routerLink]="item.path ? ['/', site(), item.path] : ['/', site()]"
          routerLinkActive="primary-nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ item.translationKey | translate }}
        </a>
      }
    </nav>
    <app-search />
    <div class="header-actions">
      <div class="header-actions__cart">
        <button
          type="button"
          [matBadge]="itemCount$ | async"
          (click)="goToCart()"
        >
          <i class="bi bi-cart2"></i>
        </button>
      </div>
      <div class="header-actions__account">
        <i class="bi bi-person-circle"></i>
        <div class="header-actions__account-menu">
          @for (item of (accountMenuItems$ | async) ?? []; track item.label) {
            <button type="button" (click)="item.action()">
              <i [class]="item.icon"></i>
              {{ item.label }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
}
