@if (isCheckoutRoute) {
  <div class="checkout-header">
    <div class="brand">
      <h1>ORANGE</h1>
      <mat-icon aria-hidden="true">shopping_bag</mat-icon>
    </div>
  </div>
} @else {
  <div class="header">
    <a
      class="home-btn"
      [routerLink]="['/', site(), 'products']"
      aria-label="Orange home"
    >
      <div class="brand">
        <mat-icon aria-hidden="true">shopping_bag</mat-icon>
        <h1>ORANGE</h1>
      </div>
    </a>
    <app-search />
    <div class="cta">
      <div class="cta__cart">
        <button
          type="button"
          [matBadge]="itemCount$ | async"
          (click)="goToCart()"
        >
          <i class="bi bi-cart2"></i>
        </button>
      </div>
      <div class="cta__account">
        <i class="bi bi-person-circle"></i>
        <div class="account-dropdown">
          @for (item of (accountMenuItems$ | async) ?? []; track item.label) {
            <button type="button" (click)="item.action()">
              <i [class]="item.icon"></i>
              {{ item.label }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
}
