@if (isLoginRoute()) {
  <router-outlet />
} @else {
  <div class="admin-shell">
    <aside class="admin-shell__nav" aria-label="Admin navigation">
      <a class="admin-shell__brand" routerLink="/analytics">
        Project Orange Admin
      </a>

      <nav class="admin-shell__links">
        <a routerLink="/analytics" routerLinkActive="is-active">
          Analytics
        </a>
        <a routerLink="/orders" routerLinkActive="is-active">Orders</a>
        <a routerLink="/products" routerLinkActive="is-active">
          Products
        </a>
      </nav>
    </aside>

    <main class="admin-shell__content">
      <router-outlet />
    </main>
  </div>
}
