name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  libraries:
    name: Shared Libraries Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint libraries
        run: npm run lint:libs

      - name: Build libraries
        run: npm run build:libs

  project-orange-storefront:
    name: Project Orange Storefront Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npx ng lint project-orange-storefront

      - name: Unit tests
        run: npx ng test project-orange-storefront --watch=false

      - name: End-to-end tests
        run: npm run e2e

      - name: Build
        run: npx ng build project-orange-storefront

  project-orange-admin:
    name: Project Orange Admin Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint project-orange-admin

      - name: Unit tests
        run: npx ng test project-orange-admin --watch=false

      - name: Build
        run: npx ng build project-orange-admin
